methodology_summary: |
  Pure Semantic Capability Matching engine. Extract candidate career_history descriptions and batch-encode them using all-MiniLM-L6-v2 to evaluate Cosine Similarity against JD requirements (50%). Mixed with behavioral signals (25%), experience math (20%), and location (5%). Applies strict multiplicative penalties for Job Hoppers, "IT Services" traps, and Honeypot accounts using math heuristics. Processes 100K candidates in under 5 minutes on CPU.

